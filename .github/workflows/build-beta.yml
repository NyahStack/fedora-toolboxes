name: ublue beta

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  parked:
    name: Beta lane parked
    runs-on: ubuntu-latest
    steps:
      - name: Beta lane status
        run: |
          echo "Beta lane is parked."
          echo "Reserved target: Fedora 45 once it is in testing and image digests are added."
          echo "No beta builds are run from this workflow yet."
